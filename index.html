<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="Styles.css" rel="stylesheet" type="text/css">
  <link href="bootstrap/bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="images/logo_Mobile.png" type="image/png">
  <title>JustStreamIt</title>
</head>
<body>
  <header>
    <img id="logo" src="images/logo_Dekstop.png" alt="JustStreamIt - Vidéos à la demande">
  </header>

  <main>
    <section id="meilleur-film">
      <h2 class="titre-section">Meilleur film</h2>
      <div class="meilleur-film-contenu">
        <img src="..." alt="Titre du film">
        <div class="meilleur-film-infos">
          <h3>Titre du film</h3>
          <p id="meilleur-resume">Résumé du film...</p>
          <button id="btn-details-meilleur">Détails</button>
        </div>
      </div>
    </section>

    <section id="meilleurs-films">
      <h2 class="titre-section">Films les mieux notés</h2>
      <div class="row"></div>
    </section>

    <section id="sci-fi">
      <h2 class="titre-section">Sci-Fi</h2>
      <div class="row"></div>
    </section>

    <section id="film-noir">
      <h2 class="titre-section">Film-Noir</h2>
      <div class="row"></div>
    </section>

    <section id="policier">
      <h2 class="titre-section">Crime</h2>
      <div class="row"></div>
    </section>

    <section id="autres">
      <h2 class="titre-section">Autres</h2>
      <select id="choix-genre">
        <option value="">-- Choisir un genre --</option>
      </select>
      <div class="row"></div>
    </section>
  </main>

  <footer></footer>

  <div class="modal fade" id="modalFilm" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-titre"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body d-flex flex-column flex-md-row gap-3">
          <img id="modal-img" src="" alt="" style="width:200px; height:300px; object-fit:cover;">
          <div>
            <p><strong>Genres :</strong> <span id="modal-genres"></span></p>
            <p><strong>Date de sortie :</strong> <span id="modal-date"></span></p>
            <p><strong>Classification :</strong> <span id="modal-classification"></span></p>
            <p><strong>Score IMDB :</strong> <span id="modal-score"></span></p>
            <p><strong>Réalisateur :</strong> <span id="modal-realisateur"></span></p>
            <p><strong>Acteurs :</strong> <span id="modal-acteurs"></span></p>
            <p><strong>Durée :</strong> <span id="modal-duree"></span></p>
            <p><strong>Pays :</strong> <span id="modal-pays"></span></p>
            <p><strong>Recettes :</strong> <span id="modal-recettes"></span></p>
            <p><strong>Résumé :</strong> <span id="modal-resume"></span></p>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-fermer" data-bs-dismiss="modal">Fermer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
  <script src="bootstrap/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
